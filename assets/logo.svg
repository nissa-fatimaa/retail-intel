<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F1B33"/>
      <stop offset="100%" stop-color="#152544"/>
    </linearGradient>
    <linearGradient id="barGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect x="6" y="6" width="116" height="116" rx="22" ry="22" fill="url(#bgGrad)" stroke="#2A4475" stroke-width="1.5"/>
  <!-- Bars (sales) -->
  <rect x="26" y="74" width="14" height="32" rx="3" fill="url(#barGrad)" opacity="0.9"/>
  <rect x="46" y="58" width="14" height="48" rx="3" fill="url(#barGrad)" opacity="0.9"/>
  <rect x="66" y="42" width="14" height="64" rx="3" fill="url(#barGrad)"/>
  <rect x="86" y="62" width="14" height="44" rx="3" fill="url(#barGrad)" opacity="0.85"/>
  <!-- Trend line -->
  <polyline fill="none" stroke="url(#lineGrad)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"
    points="28,68 50,52 72,34 94,46"/>
  <!-- Trend dots -->
  <circle cx="28" cy="68" r="3.5" fill="#A78BFA"/>
  <circle cx="50" cy="52" r="3.5" fill="#A78BFA"/>
  <circle cx="72" cy="34" r="3.5" fill="#38BDF8"/>
  <circle cx="94" cy="46" r="3.5" fill="#38BDF8"/>
  <!-- Spark / accent triangle (intel) -->
  <path d="M104 22 l6 10 l-12 0 z" fill="#38BDF8" opacity="0.9"/>
</svg>
